<div class="repos-page">
  <h1 class="page-title">Repositorios</h1>
  <table class="repos-table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Lenguaje</th>
        <th>⭐ Estrellas</th>
        <th>Fecha</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of repositorios$ | async">
        <td class="repo-name">{{ r.name }}</td>
        <td class="repo-desc">{{ r.description }}</td>
        <td><span class="lang-badge">{{ r.language }}</span></td>
        <td class="stars">{{ r.stars }}</td>
        <td class="date">{{ r.createdAt | date:'mediumDate' }}</td>
        <td><a class="btn-ver" [routerLink]="['/repositorios', r.id]">Ver</a></td>
      </tr>
    </tbody>
  </table>
</div>
